{% extends 'users/userbase.html' %}
{% load static %}

{% block content %}

<div class="container mt-4">

<h2 class="text-center text-primary mb-4">Baby Weight Prediction</h2>

<form method="post" action="{% url 'prediction' %}">
{% csrf_token %}

<!-- 👩 MOTHER -->
<div class="card p-4 mb-4 shadow">
<h4 class="text-center text-danger">Mother Details</h4>

<div class="row">

<div class="col-md-4 mb-3">
<label>Age</label>
<input type="number" name="mage" class="form-control" required>
</div>

<div class="col-md-4 mb-3">
<label>Education</label>
<select name="meduc" class="form-control">
<option value="1">SSC</option>
<option value="2">Inter</option>
<option value="3">Degree</option>
<option value="4">PG</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Weight Gained</label>
<input type="number" name="gained" class="form-control" required>
</div>

<div class="col-md-4 mb-3">
<label>Doctor Visits</label>
<input type="number" name="visits" class="form-control" required>
</div>

<div class="col-md-4 mb-3">
<label>Total Pregnancies</label>
<input type="number" name="totalp" class="form-control" required>
</div>

<div class="col-md-4 mb-3">
<label>Previous Baby Death</label>
<select name="bdead" class="form-control">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Full Term Deliveries</label>
<input type="number" name="terms" class="form-control" required>
</div>

<div class="col-md-4 mb-3">
<label>Last Outcome</label>
<select name="loutcome" class="form-control">
<option value="0">Normal</option>
<option value="1">Miscarriage</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Pregnancy Weeks</label>
<input type="number" name="weeks" class="form-control" required>
</div>

<div class="col-md-4 mb-3">
<label>Race</label>
<select name="racemom" class="form-control">
<option value="1">White</option>
<option value="2">Black</option>
<option value="3">Asian</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Hispanic</label>
<select name="hispmom" class="form-control">
<option value="0">Non-Hispanic</option>
<option value="1">Hispanic</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Smoking</label>
<select name="cignum" class="form-control">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Alcohol</label>
<select name="drinknum" class="form-control">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

</div>
</div>

<!-- 👨 FATHER -->
<div class="card p-4 mb-4 shadow">
<h4 class="text-center text-primary">Father Details</h4>

<div class="row">

<div class="col-md-4 mb-3">
<label>Age</label>
<input type="number" name="fage" class="form-control" required>
</div>

<div class="col-md-4 mb-3">
<label>Education</label>
<select name="feduc" class="form-control">
<option value="1">SSC</option>
<option value="2">Inter</option>
<option value="3">Degree</option>
<option value="4">PG</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Race</label>
<select name="racedad" class="form-control">
<option value="1">White</option>
<option value="2">Black</option>
<option value="3">Asian</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Hispanic</label>
<select name="hispdad" class="form-control">
<option value="0">Non-Hispanic</option>
<option value="1">Hispanic</option>
</select>
</div>

</div>
</div>

<!-- ❤️ HEALTH -->
<div class="card p-4 mb-4 shadow">
<h4 class="text-center text-success">Health Details</h4>

<div class="row">

<div class="col-md-3 mb-3">
<label>Anemia</label>
<select name="anemia" class="form-control">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="col-md-3 mb-3">
<label>Diabetes</label>
<select name="diabetes" class="form-control">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="col-md-3 mb-3">
<label>Cardiac</label>
<select name="cardiac" class="form-control">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="col-md-3 mb-3">
<label>BP</label>
<select name="hyperpr" class="form-control">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Hemoglobin</label>
<input type="number" step="0.1" name="hemoglobin" class="form-control" required>
</div>

<div class="col-md-4 mb-3">
<label>Amniotic Fluid</label>
<select name="hydram" class="form-control">
<option value="0">No Problem</option>
<option value="1">Problem</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Preterm</label>
<select name="preterm" class="form-control">
<option value="0">Normal</option>
<option value="1">Preterm</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>RH Factor</label>
<select name="rhsen" class="form-control">
<option value="0">Same</option>
<option value="1">Mismatch</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>Uterus Problem</label>
<select name="uterine" class="form-control">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

</div>
</div>

<!-- BUTTON -->
<div class="text-center">
<button class="btn btn-success w-50">Predict</button>
</div>

</form>

</div>

{% endblock %}
