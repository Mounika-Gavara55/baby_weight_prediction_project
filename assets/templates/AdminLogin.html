{% extends 'base.html' %}
{% load static %}

{% block title %}Admin Login{% endblock %}
{% block admin_login %}active{% endblock %}

{% block content %}
<div class="container" style="margin-top: 150px;">
    <div class="row justify-content-center">
        <div class="col-md-6 glass-card p-5">
            <h2 class="text-center p-2 text-primary font-weight-bold">Admin Login</h2>
            <form action="{% url 'AdminLoginCheck' %}" method="POST" class="text-primary mt-4">
                {% csrf_token %}

                <div class="form-group row">
                    <div class="col-md-12">
                        <input type="text" class="form-control" name="loginid" required placeholder="Enter Login Id"
                            style="background: rgba(255,255,255,0.8); border: none;">
                    </div>
                </div>
                <div class="form-group row">
                    <div class="col-md-12">
                        <input type="password" class="form-control" name="pswd" required placeholder="Enter password"
                            style="background: rgba(255,255,255,0.8); border: none;">
                    </div>
                </div>
                <div class="form-group row">
                    <div class="col-md-12">

                        <center>
                            <input type="submit" class="btn btn-primary px-5">
                            <input type="reset" class="btn btn-outline-dark px-5">
                        </center>
                    </div>
                </div>


                <!-- Message -->
                {% if messages %}
                {% for message in messages %}
                <p align="center" class="text-danger mt-3"> {{ message }}</p>
                {% endfor %}
                {% endif %}

            </form>
        </div>
    </div>
</div>
{% endblock %}
